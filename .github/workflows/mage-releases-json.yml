name: mage-releases-json

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#permissions
permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'
  push:
    branches:
      - 'master'
  pull_request:
    paths-ignore:
      - '.github/mage-releases.json'

jobs:
  generate:
    uses: crazy-max/.github/.github/workflows/releases-json.yml@ae42952868c79d61ebfa3a9665c53f68ec23976a
    with:
      repository: magefile/mage
      artifact_name: mage-releases-json
      filename: mage-releases.json
    secrets: inherit

  open-pr:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      # required to create PR
      contents: write
      pull-requests: write
    needs:
      - generate
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Download
        uses: actions/download-artifact@v8
        with:
          name: mage-releases-json
          path: .github
      -
        name: Commit changes
        run: |
          git add -A .
      -
        name: Create PR
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0
        with:
          base: master
          branch: bot/mage-releases-json
          commit-message: "update .github/mage-releases.json"
          signoff: true
          delete-branch: true
          title: "Update `.github/mage-releases.json`"
          body: |
            Update `.github/mage-releases.json` to keep in sync with [https://github.com/magefile/mage](https://github.com/magefile/mage).
          draft: false
