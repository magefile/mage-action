name: mage-releases-json

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'
  push:
    branches:
      - 'master'
  pull_request:

jobs:
  generate:
    uses: crazy-max/.github/.github/workflows/releases-json.yml@9ba6e6f9450baf3b1237f8035c1fdc45932510bd # v1.8.0
    with:
      repository: magefile/mage
      artifact_name: mage-releases-json
      filename: mage-releases.json

  open-pr:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
      pull-requests: write
    needs:
      - generate
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      -
        name: Download
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mage-releases-json
          path: .github
      -
        name: Commit changes
        run: |
          git add -A .
      -
        name: Create PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          base: master
          branch: bot/mage-releases-json
          commit-message: "update .github/mage-releases.json"
          signoff: true
          delete-branch: true
          title: "Update `.github/mage-releases.json`"
          body: |
            Update `.github/mage-releases.json` to keep in sync with [https://github.com/magefile/mage](https://github.com/magefile/mage).
          draft: false
