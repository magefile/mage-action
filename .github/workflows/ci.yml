name: ci

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  schedule:
    - cron: '0 10 * * *'
  push:
    branches:
      - 'master'
      - 'releases/v*'
    tags:
      - 'v*'
  pull_request:

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          # TODO: uncomment when arm64 binaries are available: https://github.com/magefile/mage/issues/481
          # - macos-26
          - macos-26-intel
          - windows-latest
        version:
          - latest
          - v1.8.0
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      -
        name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.20"
          cache-dependency-path: test/go.sum
      -
        name: Mage
        uses: ./
        with:
          version: ${{ matrix.version }}
          args: build
          workdir: tests/fixtures/app
          cache-binary: false

  install-only:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          # TODO: uncomment when arm64 binaries are available: https://github.com/magefile/mage/issues/481
          # - macos-26
          - macos-26-intel
          - windows-latest
        version:
          - latest
          - v1.8.0
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      -
        name: Install Mage
        uses: ./
        with:
          version: ${{ matrix.version }}
          install-only: true
          cache-binary: false
      -
        name: Show Mage version
        run: mage --version

  cache-binary:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      -
        name: Install Mage
        uses: ./
        with:
          version: v1.14.0
          install-only: true
          cache-binary: true
      -
        name: Show Mage version
        run: mage --version
